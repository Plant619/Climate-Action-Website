<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-LN+7fdVzj6u52u30Kp6M/trliBMCMKTyK833zpbD+pXdCLuTusPj697FH4R/5mcr" crossorigin="anonymous">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/styles.css">
    <script src="../js/script.js" defer></script>
</head>
<body id="myForm">
    <!--                                             Navbar                                                      -->
    <nav class="navbar navbar-expand-md navbar-light border-bottom" aria-label="Main site navigation">
        <div class="container">
            <a class="navbar-brand" href="#">Climate Action Starts with You</a> 

            <!-- Offcontent -->
            <div class="offcanvas offcanvas-start" tabindex="-1" id="offcanvas" aria-labelledby="offcanvas_navigation">
                <div class="offcanvas-header">
                    <h3 class="offcanvas-title" id="offcanvas_navigation">Navigation Menu</h3>
                    <button type="button" class="btn-close" data-bs-dismiss="offcanvas" aria-label="Close"></button>
                </div>
                <div class="offcanvas-body">
                    <ul class="navbar-nav ms-auto">
                        <li class="nav-item">
                            <a class="nav-link" href="index.html">Home</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="info.html">More Info</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link active" href="form.html">Form</a>
                        </li>
                    </ul>
                </div>
            </div>

            <button class="navbar-toggler" type="button" data-bs-toggle="offcanvas" data-bs-target="#offcanvas">
                <span class="navbar-toggler-icon"></span>
            </button>
        </div>
    </nav>

    <div class="mx-xl-7 mx-lg-6 mx-sm-4 mx-1">
        <h1>Show you care</h1>
        <div id="progress_bar"></div>
        <form id="form">
        <!--                                        Section 1: Personal Info                                         -->
            <section id="personal_info">
                <hr>
                <h2>Section 1: Personal Info</h2>
                <hr>
                <!-- Input type: Text-->
                <div class="form-floating mb-3">
                    <input class="form-control" id="name" type="text" placeholder="Enter your Name" required aria-required="true">
                    <label for="name">Enter your Name</label>
                </div>
                <!-- Input type: Email-->
                <div class="form-floating mb-3">
                    <input class="form-control" id="email" type="email" placeholder="Enter your Email" required aria-required="true">
                    <label for="email">Enter your Email</label>
                </div>

                <!-- Input Type: Select (Dropdown)-->    
                <div class="form-group mb-3">
                    <label for="age">Select your Age Group</label>
                    <select class="form-select" name="age" id="age" required aria-required="true">
                        <option value="" disabled selected>Select your Age Group</option>
                        <option value="under18">Under 18</option>
                        <option value="18-24">18 - 24</option>
                        <option value="25-34">25 - 34</option>
                        <option value="35-44">35 - 44</option>
                        <option value="45-54">45 - 54</option>
                        <option value="55-64">55 - 64</option>
                        <option value="over65">65 and over</option>
                    </select>
                </div>

                <!--country-->
                <div class="form-group mb-3">
                    <label for="country">Select your Country</label>
                    <select class="form-select" name="country" id="country" size="5" required aria-required="true">
                        <option value="" disabled selected>Select your Country</option>
                        <option value="Australia">Australia</option>
                        <option value="Brazil">Brazil</option>
                        <option value="Canada">Canada</option>
                        <option value="China">China</option>
                        <option value="France">France</option>
                        <option value="Germany">Germany</option>
                        <option value="India">India</option>
                        <option value="Indonesia">Indonesia</option>
                        <option value="Italy">Italy</option>
                        <option value="Japan">Japan</option>
                        <option value="Mexico">Mexico</option>
                        <option value="Malaysia">Malaysia</option>
                        <option value="Nigeria">Nigeria</option>
                        <option value="Russia">Russia</option>
                        <option value="Singapore">Singapore</option>
                        <option value="South Africa">South Africa</option>
                        <option value="South Korea">South Korea</option>
                        <option value="Spain">Spain</option>
                        <option value="Sweden">Sweden</option>
                        <option value="Switzerland">Switzerland</option>
                        <option value="Turkey">Turkey</option>
                        <option value="United Arab Emirates">United Arab Emirates</option>
                        <option value="United Kingdom">United Kingdom</option>
                        <option value="United States">United States</option>
                        <option value="Others">Others</option>
                    </select>
                </div>
            </section>
            <hr>

        <!--                                  Section 2: Awareness & Lifestyle                                       -->
            <section id="awareness_and_lifestyle">
                <h2>Section 2: Awareness & Lifestyle</h2>
                <hr>
                <!-- Input type: Range slider -->
                 <!-- NOTE: add js to get  the current range number-->
                <div class="form-group mb-3">
                    <label for="slider">How environmentally conscious are you? 0% (Not at all) - 100% (Extremely)</label>
                    <input type="range" class="form-range" id="slider" name="slider" min="0" max="100">
                </div>
                <p>Slider value: <span id="slider_value"></span>%</p>
                <!-- Input type: Checkbox-->
                <!-- Add checkboxes with a list of eco-friendly actions to choose from -->
                <!-- Could add icons-->
                <div class="form-group mb-3">
                    <label class="mb-2"> What are some eco-friendly actions you practice? </label>
                    <div class="row mb-2">
                        <div class="col-md-4">
                            <input type="checkbox" id="reduce_reuse_recycle" value="reduce, reuse and recycle" required aria-required="true">
                            <label for="reduce_reuse_recycle"><i class="bi bi-recycle"></i> 3Rs (Reduce, Reuse, Recycle)</label>
                        </div>
                        <div class="col-md-4">
                            <input type="checkbox" id="public_transport" value="take public transport">
                            <label for="public_transport"><i class="bi bi-bus-front"></i> Take Public Transportation</label>
                        </div>
                        <div class="col-md-4">
                            <input type="checkbox" id="energy_efficient_appliances" value="use energy efficient appliances">
                            <label for="energy_efficient_appliances"><i class="bi bi-lightbulb-fill"></i> Use Energy-Efficient Appliances</label>
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-md-4">
                            <input type="checkbox" id="avoid_disposable_items" value="avoid disposable items" required aria-required="true">
                            <label for="avoid_disposable_items"><i class="bi bi-trash"></i> Avoid disposable items</label>
                        </div>
                        <div class="col-md-4">
                            <input type="checkbox" id="shop_local" value="shop local">
                            <label for="shop_local"><i class="bi bi-basket2"></i> Shop Local</label>
                        </div>
                        <div class="col-md-4">
                            <input type="checkbox" id="eat_less_meat" value="eat less meat">
                            <label for="eat_less_meat">
                                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-fork-knife" viewBox="0 0 16 16">
                                    <path d="M13 .5c0-.276-.226-.506-.498-.465-1.703.257-2.94 2.012-3 8.462a.5.5 0 0 0 .498.5c.56.01 1 .13 1 1.003v5.5a.5.5 0 0 0 .5.5h1a.5.5 0 0 0 .5-.5zM4.25 0a.25.25 0 0 1 .25.25v5.122a.128.128 0 0 0 .256.006l.233-5.14A.25.25 0 0 1 5.24 0h.522a.25.25 0 0 1 .25.238l.233 5.14a.128.128 0 0 0 .256-.006V.25A.25.25 0 0 1 6.75 0h.29a.5.5 0 0 1 .498.458l.423 5.07a1.69 1.69 0 0 1-1.059 1.711l-.053.022a.92.92 0 0 0-.58.884L6.47 15a.971.971 0 1 1-1.942 0l.202-6.855a.92.92 0 0 0-.58-.884l-.053-.022a1.69 1.69 0 0 1-1.059-1.712L3.462.458A.5.5 0 0 1 3.96 0z"/>
                                </svg> Eat Less Meat</label>
                        </div>
                    </div>
                </div>
                
                <!-- Input type: Radio buttons: -->
                <div class="form-group mb-3">
                    <label>How commited are you to reducing your carbon footprint? </label>
                    <div class="form-check">
                        <input type="radio" class="form-check-input" name="commitmentLevel" id="extremely_committed" value="extremely committed" required aria-required="true">
                        <label for="extremely_committed" class="form-check-label">Extremely committed</label>
                    </div>

                    <div class="form-check">
                        <input type="radio" class="form-check-input" name="commitmentLevel" id="committed" value="committed">
                        <label for="committed" class="form-check-label">Committed</label>
                    </div>

                    <div class="form-check">
                        <input type="radio" class="form-check-input" name="commitmentLevel" id="neutral" value="neutral">
                        <label for="neutral" class="form-check-label">Neutral</label>
                    </div>

                    <div class="form-check">
                        <input type="radio" class="form-check-input" name="commitmentLevel" id="not_committed" value="not committed">
                        <label for="not_committed" class="form-check-label">Not Committed</label>
                    </div>

                    <div class="form-check">
                        <input type="radio" class="form-check-input" name="commitmentLevel" id="not_committed_at_all" value="not committed at all">
                        <label for="not_committed_at_all" class="form-check-label">Not Committed at all</label>
                    </div>
                </div>
                
            </section>
            <hr>
            <!--                                            Section 3: Pledge                                            -->
            <section>
                <h2>Section 3: Pledge</h2>
                <hr>
                <!-- Maybe add examples -->
                
                <!-- Input type: Text area -->
                <div class="form-group mb-3">
                    <label for="pledge">Write a short pledge to the environment: </label>
                    <!-- Source: https://www.nepa.gov.jm/sites/default/files/2019-12/environmental_pledge.pdf -->
                    <textarea name="pledge" id="pledge" class="form-control" placeholder="Eg. I will respect all living things, and the natural environment on which they depend, for each is a link in the chain that supports life on earth. I will reduce, reuse, and recycle to minimize waste." required></textarea>
                    <div>Word count: <span id="word_count_1"></span></div>
                </div>

                <!-- Input type: Text-area -->
                <div class="form-group mb-3">
                    <label for="committments">Write some committments you would like to work towards for the environment:</label>
                    <textarea name="committments" id="committments" class="form-control" placeholder="Eg. Reducing waste, Supporting sustainable businesses, Buy local produce, Take public transportation" rows="5" required></textarea>
                    <div>Word count: <span id="word_count_2"></span></div>
                </div>
            </section>
            
            <button class="btn btn-primary mb-3" type="submit" id="submit">Submit</button>
        </form>
    </div>

    <!-- Maybe can display text with commitments -->
    <!-- Display confirmation message -->
    <!-- A pledge wall if possible -->
    <!-- Maybe a counter that counts number of forms submitted with animation for effect -->
    <div class="modal fade" id="modal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="modal_title">Placeholder</h5>
                    <button class="btn-close" type="button" aria-label="Close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body" id="modal_text">
                </div>
            </div>
        </div>
    </div>

    <div class="mx-xl-7 mx-lg-6 mx-sm-4 mx-1" id="output"></div>

    <footer class="bg-info p-2 text-center" id="footer">
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js" integrity="sha384-ndDqU0Gzau9qJ1lfW4pNLlhNTkCfHzAVBReH9diLvGRem5+R9g2FzA8ZGN954O5Q" crossorigin="anonymous"></script>
</body>
</html>
